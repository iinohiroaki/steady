<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- STEADY v3.2.0r2 PWA icon
       theme: emo lab(落ち着いた紫〜青)・控えめ・テーマカラー#1a1a2e背景＋アクセント#7c6af7
       purpose: any maskable（safe area: 中央 80% に主要ビジュアル収める） -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2a2745"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#5a4fc7"/>
    </linearGradient>
  </defs>

  <!-- 背景（maskable safe zone を満たす全面塗り） -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- メトロノーム振り子の弧（控えめな曲線） -->
  <g transform="translate(256 256)">
    <!-- 外周リング -->
    <circle r="156" fill="none" stroke="url(#ring)" stroke-width="6" opacity="0.35"/>
    <!-- 内側リング -->
    <circle r="120" fill="none" stroke="#7c6af7" stroke-width="3" opacity="0.5"/>

    <!-- 4つのドット（4拍を控えめに表現） -->
    <circle cx="0"    cy="-130" r="11" fill="#9d8dfa"/>
    <circle cx="130"  cy="0"    r="9"  fill="#7c6af7" opacity="0.85"/>
    <circle cx="0"    cy="130"  r="9"  fill="#7c6af7" opacity="0.85"/>
    <circle cx="-130" cy="0"    r="9"  fill="#7c6af7" opacity="0.85"/>

    <!-- 中央の振り子バー（縦） -->
    <line x1="0" y1="-90" x2="0" y2="60" stroke="#e5e2ff" stroke-width="6" stroke-linecap="round"/>
    <!-- 振り子の重り -->
    <circle cx="0" cy="-50" r="14" fill="#e5e2ff"/>
    <!-- 中心軸 -->
    <circle cx="0" cy="60" r="10" fill="#9d8dfa"/>
  </g>

  <!-- タイトル "S" を控えめに（左下・装飾） -->
  <text x="256" y="438" font-family="-apple-system, 'Segoe UI', sans-serif"
        font-size="64" font-weight="700" fill="#e5e2ff" opacity="0.55"
        text-anchor="middle">STEADY</text>
</svg>
